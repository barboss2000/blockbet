<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockBet</title>

<style>

body{
background:#050b18;
color:white;
font-family:Arial;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#081226;
border-bottom:1px solid #1b2b4a;
}

.logo{
font-size:22px;
font-weight:bold;
color:#f7931a;
}

.connect{
background:#f7931a;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.container{
display:flex;
}

.chart{
flex:2;
height:600px;
border-right:1px solid #1b2b4a;
}

.sidebar{
flex:1;
padding:20px;
}

.market{
background:#0d1c35;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

.market h3{
font-size:16px;
margin:0 0 10px 0;
}

.market p{
font-size:13px;
color:#8aa2d4;
}

.betbox{
margin-top:10px;
}

input{
width:100%;
padding:8px;
border-radius:6px;
border:none;
margin-bottom:8px;
}

.buttons{
display:flex;
gap:8px;
}

.up{
flex:1;
background:#23c552;
border:none;
padding:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.down{
flex:1;
background:#e84142;
border:none;
padding:10px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.loading{
padding:30px;
text-align:center;
color:#aaa;
}

</style>
</head>

<body>

<header>

<div class="logo">
BLOCKBET
</div>

<button class="connect">
Connect Wallet
</button>

</header>


<div class="container">

<div class="chart" id="chart">

</div>

<div class="sidebar">

<h2>Polymarket Events</h2>

<div id="markets">

<div class="loading">
Loading markets...
</div>

</div>

</div>

</div>



<script>

const API="https://blockbet.vercel.app/api/markets"

async function loadMarkets(){

try{

const res=await fetch(API)

const markets=await res.json()

renderMarkets(markets)

}catch(e){

document.getElementById("markets").innerHTML=
"<p>API error</p>"

}

}


function renderMarkets(markets){

const container=document.getElementById("markets")

container.innerHTML=""

markets.forEach(m=>{

const el=document.createElement("div")

el.className="market"

el.innerHTML=`

<h3>${m.question}</h3>

<p>Liquidity: $${Math.round(m.liquidity)}</p>

<div class="betbox">

<input type="number" placeholder="Amount">

<div class="buttons">

<button class="up" onclick="bet('${m.id}','UP')">
UP
</button>

<button class="down" onclick="bet('${m.id}','DOWN')">
DOWN
</button>

</div>

</div>

`

container.appendChild(el)

})

}



function bet(id,side){

alert("Bet placed on market "+id+" : "+side)

}


loadMarkets()

</script>

</body>
</html>
