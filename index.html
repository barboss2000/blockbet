<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>BlockBet</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://s3.tradingview.com/tv.js"></script>

<style>

body{
background:#020617;
color:white;
font-family:Inter;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
border-bottom:1px solid #1e293b;
}

.logo{
font-weight:700;
font-size:22px;
}

.logo span{
color:#f7931a;
}

.connect{
background:#f7931a;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

.layout{
display:grid;
grid-template-columns:1fr 420px;
height:calc(100vh - 70px);
}

.chart{
border-right:1px solid #1e293b;
}

#tv_chart{
height:100%;
}

.panel{
padding:20px;
overflow:auto;
}

.market{
background:#0f172a;
border:1px solid #1e293b;
padding:14px;
border-radius:10px;
margin-bottom:14px;
}

.market-title{
font-weight:600;
margin-bottom:6px;
}

.market-date{
font-size:12px;
color:#94a3b8;
}

.market-buttons{
margin-top:10px;
}

.market-buttons button{
border:none;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
margin-right:6px;
}

.yes{
background:#22c55e;
color:white;
}

.no{
background:#ef4444;
color:white;
}

.bet-box{
margin-top:20px;
background:#0f172a;
border:1px solid #1e293b;
padding:20px;
border-radius:12px;
}

.bet-box input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
background:#020617;
border:1px solid #1e293b;
color:white;
border-radius:6px;
}

.bet-buttons button{
width:48%;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
}

.bet-buttons{
display:flex;
justify-content:space-between;
}

</style>

</head>

<body>

<header>

<div class="logo">
BLOCK<span>BET</span>
</div>

<button class="connect">
Connect Wallet
</button>

</header>

<div class="layout">

<div class="chart">
<div id="tv_chart"></div>
</div>

<div class="panel">

<h3>Polymarket Events</h3>

<div id="markets"></div>

<div class="bet-box">

<h3>Place Bet</h3>

<input id="amount" placeholder="Amount">

<div class="bet-buttons">

<button class="yes" onclick="bet('UP')">UP</button>

<button class="no" onclick="bet('DOWN')">DOWN</button>

</div>

</div>

</div>

</div>

<script>

new TradingView.widget({

container_id:"tv_chart",
symbol:"BINANCE:BTCUSDT",
interval:"5",
theme:"dark",
style:"1",
autosize:true,
toolbar_bg:"#020617",
enable_publishing:false,
hide_top_toolbar:false

});

let selectedMarket = null;

async function loadMarkets(){

try{

const res = await fetch("https://gamma-api.polymarket.com/markets");

const markets = await res.json();

const container = document.getElementById("markets");

container.innerHTML="";

markets.slice(0,20).forEach(m=>{

const el=document.createElement("div");

el.className="market";

el.innerHTML=`

<div class="market-title">

${m.question}

</div>

<div class="market-date">

End: ${new Date(m.endDate).toLocaleDateString()}

</div>

<div class="market-buttons">

<button class="yes" onclick="selectMarket('${m.question}')">

YES

</button>

<button class="no" onclick="selectMarket('${m.question}')">

NO

</button>

</div>

`;

container.appendChild(el);

});

}catch(e){

console.log("error loading polymarket",e)

}

}

function selectMarket(q){

selectedMarket=q;

alert("Selected market: "+q);

}

function bet(direction){

if(!selectedMarket){

alert("Select market first");

return;

}

const amount=document.getElementById("amount").value;

alert(

"Bet placed\n\nMarket: "+selectedMarket+"\nDirection: "+direction+"\nAmount: "+amount

);

}

loadMarkets();

setInterval(loadMarkets,30000);

</script>

</body>

</html>
